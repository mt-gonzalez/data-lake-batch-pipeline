services:
  postgres:
    image: postgres:latest
    networks:
      - source_net
    environment: 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sources/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql



  source-api:
    build: ./sources/api
    ports:
      - "8000:8000"
    volumes:
      - ./sources/api:/app




networks:
  source_net:

volumes:
  postgres_data: